services:
  wikillm-api:
    image: ${IMAGE:-ghcr.io/lukasparke/wikillm-api}:${TAG:-latest}
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - WIKI_ROOT=/wiki
      - API_KEYS=${API_KEYS}
      - PUBLIC_READ=${PUBLIC_READ:-true}
      - DB_PATH=/wiki/.wikillm-api.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Local directory mount (default)
      - ${WIKI_PATH:-./wiki}:/wiki
      # Or mount a remote/network filesystem path from the host:
      # - /mnt/nas/wiki:/wiki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
